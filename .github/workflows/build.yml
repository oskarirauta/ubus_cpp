name: "CI build"
run-name: ${{ github.actor }} executed build ${{ inputs.testname }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      testname:
        default: "manually"
        description: "build title"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    # ubus/libubox live in Alpine's edge/testing repo, so build inside an Alpine
    # container (via docker run, which also sidesteps actions/checkout's glibc
    # node not running on musl).
    - name: make (Alpine + ubus from edge/testing)
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:edge sh -c '
          apk add --no-cache build-base linux-headers json-c-dev \
            --repository=https://dl-cdn.alpinelinux.org/alpine/edge/testing \
            libblobmsg libubox libubox-dev libubox-static ubus ubus-dev &&
          make
        '
